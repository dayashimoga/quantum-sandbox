<head>

    <meta property="og:description" content="Build visual quantum circuits and simulate superposition and entanglement.">
    <meta property="og:url" content="https://quantumsandbox.quickutils.top/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <script type="application/ld+json">

    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Quantum Circuit Sandbox",
    "url": "https://quantumsandbox.quickutils.top/",

    "applicationCategory": "BrowserApplication",

    <link rel="canonical" href="https://quantumsandbox.quickutils.top/">
    <meta name="description" content="Build visual quantum circuits and simulate superposition and entanglement.">
    <link rel="stylesheet" href="../../quickutils-core.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#ffffff">
</head>
<body class="quantum-bg">
    <nav class="navbar glass-nav">
        <div class="container nav-inner">
            <a href="../../index.html" class="brand holo-text">⚛️ Quantum Sandbox</a>
            <div id="nav-actions">
                <button class="btn btn-outline btn-sm" id="resetBtn">Reset Circuit</button>
            </div>
        </div>
    </nav>
    <main class="container py-4">
        <div class="header-banner glass-card text-center mb-4 p-4">
            <h1 class="gradient-text neon-pulse">Build Quantum Circuits</h1>
            <p class="text-muted">Drag and drop gates to manipulate qubits. Visualize superposition and entanglement in real-time.</p>
        </div>

        <div class="quantum-layout">
            <!-- Sidebar: Gates Menu -->
            <div class="gates-panel glass-card p-3">
                <h3 class="mb-3 text-neon-blue">Logic Gates</h3>
                <div class="gates-grid" id="gateSource">
                    <!-- Standard Gates -->
                    <div class="q-gate gate-h" draggable="true" data-type="H" title="Hadamard: Creates superposition">H</div>
                    <div class="q-gate gate-x" draggable="true" data-type="X" title="Pauli-X: Quantum NOT (Flip)">X</div>
                    <div class="q-gate gate-y" draggable="true" data-type="Y" title="Pauli-Y: Y-axis rotation">Y</div>
                    <div class="q-gate gate-z" draggable="true" data-type="Z" title="Pauli-Z: Phase flip">Z</div>
                    <div class="q-gate gate-cnot" draggable="true" data-type="CNOT" title="Controlled-NOT (Entanglement)">CX</div>
                    <div class="q-gate gate-m" draggable="true" data-type="M" title="Measure">M</div>
                </div>
                
                <h3 class="mt-4 mb-3 text-neon-amber">Circuit Config</h3>
                <div class="d-flex align-items-center justify-content-between mb-2">
                    <span>Qubits</span>
                    <div class="d-flex gap-2">
                        <button class="btn btn-secondary btn-sm px-2" id="remQubitBtn">-</button>
                        <span id="qubitCount" class="fw-bold">3</span>
                        <button class="btn btn-secondary btn-sm px-2" id="addQubitBtn">+</button>
                    </div>
                <h3 class="mt-4 mb-3 text-neon-amber">Demos</h3>
                <button class="btn btn-outline btn-sm w-100 mb-2 p-2" id="btnDemoEntangle" title="Generate Bell State">Bell State (Entanglement)</button>
                <button class="btn btn-outline btn-sm w-100 p-2" id="btnDemoInterference" title="Interference via H-gate">Interference (Double Slit)</button>
            </div>

            <!-- Main Circuit Editor -->
            <div class="circuit-panel glass-card px-3 py-4" style="overflow-x: auto;">
                <div id="circuitGrid" class="circuit-grid">
                    <!-- Circuit rows generated by JS -->
                </div>
            </div>

            <!-- State Visualizer -->
            <div class="visualization-panel glass-card p-3" style="overflow-y:auto; max-height: 80vh;">
                <h3 class="mb-3 text-neon-green">State Probabilities</h3>
                <div id="probChart" class="prob-chart mb-4">
                    <!-- JS generated bars -->
                </div>

                <h3 class="mb-2 text-neon-purple text-xs text-uppercase">Bloch Sphere (Q0)</h3>
                <canvas id="blochSphere" width="200" height="200" style="display:block; margin:0 auto; background:rgba(0,0,0,0.2); border-radius:50%; margin-bottom:1rem;"></canvas>
                
                <div class="mt-2 text-center" id="blochStats" style="font-size:0.75rem; color:#aaccff;"></div>

                <div class="mt-4">
                    <h4 class="text-muted text-xs text-uppercase">Raw State Vector</h4>
                    <div id="stateVector" class="state-math text-xs mt-2" style="font-family: 'Space Grotesk', monospace; color: #aaccff; word-break: break-all;">
                        |0...0⟩ = 1.00
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../../quickutils-core.js"></script>
    <script src="script.js"></script>
    <script src="premium_injection.js"></script>
</body>
</html>
